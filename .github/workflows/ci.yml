name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    env:
      # Fake DB URL so Prisma can generate the client during build.
      # No real queries run at build time — admin pages are force-dynamic
      # and the home page wraps DB calls in try/catch.
      DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
